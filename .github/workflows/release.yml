# Publishes to PyPI on a version tag (v0.4.0, ...) via Trusted Publishing —
# no token stored in the repo. One-time setup on pypi.org:
#   Account -> Publishing -> add a "pending publisher":
#   project=agentguard-predict, owner=Prakhar998, repo=agentguard,
#   workflow=release.yml, environment=pypi
name: Release

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Test before publishing
        run: python -m unittest discover -s tests
      - name: Build
        run: pip install build && python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
